{% extends "base.html" %}

{% block title %}Gracias{% endblock %}

{% block content %}

  <!-- Background blobs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10">
    <div class="absolute top-1/3 left-1/4 w-[500px] h-[500px] bg-secondary/8 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-secondary/5 rounded-full blur-2xl"></div>
  </div>

  <div class="max-w-xl w-full text-center">

    <!-- Floating Check Icon -->
    <div class="flex justify-center mb-10 icon-scale">
      <div class="relative floating">
        <div class="w-24 h-24 rounded-full bg-secondary flex items-center justify-center shadow-2xl shadow-secondary/30">
          <span class="material-symbols-outlined text-white text-[48px]"
            style="font-variation-settings:'FILL' 1">check_circle</span>
        </div>
        <div class="pulse-ring text-secondary/30"></div>
      </div>
    </div>

    <!-- Badge -->
    <div class="fade-up-1 mb-5">
      <span
        class="inline-block px-4 py-1 bg-secondary/10 text-secondary text-[10px] font-bold uppercase tracking-[0.25em] rounded-full">
        Donation Confirmed
      </span>
    </div>

    <!-- Headline -->
    <div class="fade-up-2 mb-5">
      <h1 class="font-serif text-5xl md:text-6xl font-black leading-tight tracking-tighter text-primary dark:text-white">
        You just made<br />
        <span class="shimmer-text">history.</span>
      </h1>
    </div>

    <!-- Back to Home Button -->
    <div class="fade-up-5">
      <a href="{{ url_for('main.index') }}">
        <button
          class="inline-flex items-center gap-3 px-10 py-5 bg-secondary text-white rounded-full font-bold text-lg shadow-xl shadow-secondary/30 hover:brightness-110 active:scale-95 transition-all duration-300">
          <span class="material-symbols-outlined">home</span>
          Back to Home
        </button>
      </a>
      <p class="mt-6 text-xs text-on-surface-variant dark:text-white/30 uppercase tracking-widest">
        Together, we're building a better Africa.
      </p>
    </div>

  </div>
